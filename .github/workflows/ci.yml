name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: read

env:
  # Opt JavaScript actions into GitHub's Node 24 runner ahead of the Node 20 removal.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          args: --timeout=5m
      - name: Docs drift check
        run: scripts/check-docs-drift.sh
      - name: AUR package check
        run: scripts/check-aur-package.sh v0.7.0

  test:
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Install archive integration dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y p7zip-full
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install p7zip
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -cover

      - name: Build CLI
        run: |
          mkdir -p bin
          go build -ldflags "-s -w" -o bin/modfetch ./cmd/modfetch

      - name: CLI smoke and importer check (no network required)
        shell: bash
        run: |
          set -euo pipefail
          ./bin/modfetch version
          ./bin/modfetch completion bash >/dev/null
          ./bin/modfetch completion zsh >/dev/null
          ./bin/modfetch completion fish >/dev/null

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          cat > "$TMPDIR/config.yaml" <<EOF
          version: 1
          general:
            data_root: $TMPDIR/data
            download_root: $TMPDIR/dl
          EOF
          mkdir -p "$TMPDIR/data" "$TMPDIR/dl"

          cat > "$TMPDIR/input.txt" <<'EOF'
          https://example.com/a.bin
          https://example.com/b.bin
          EOF

          ./bin/modfetch batch import --config="$TMPDIR/config.yaml" --input="$TMPDIR/input.txt" --output="$TMPDIR/batch.yaml" --dest-dir="$TMPDIR/dl" --sha-mode=none
          test -s "$TMPDIR/batch.yaml"
          grep -q "version: 1" "$TMPDIR/batch.yaml"
          grep -q "jobs:" "$TMPDIR/batch.yaml"
          grep -q "uri: https://example.com/a.bin" "$TMPDIR/batch.yaml"
          grep -q "uri: https://example.com/b.bin" "$TMPDIR/batch.yaml"

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
